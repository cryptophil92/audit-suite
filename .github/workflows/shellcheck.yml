name: ShellCheck

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    name: ShellCheck Bash scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck \
            audit.sh \
            core/*.sh \
            bin/*.sh \
            modules/*.sh \
            ui/*.sh \
            tests/*.sh

      - name: Run validation tests
        run: bash tests/test_validate.sh
